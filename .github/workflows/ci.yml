# CI: math pipeline -> site build (KaTeX + parity + units gates) -> engine
# unit tests -> Playwright e2e + axe -> deploy to GitHub Pages on main.
#
# Deploy is LIVE (ADR-0004 rollout completed 2026-06): the repo is public,
# Pages is enabled (source: GitHub Actions), DEPLOY_PAGES=true. Every push to
# main publishes https://jd-jones-ases.github.io/Mechanic/ — there is no
# review step between merge and the public site (ADR-0007).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # --- Python math pipeline (uv-pinned; identical to local per uv.lock) ---
      - uses: astral-sh/setup-uv@v8.2.0  # no floating v8 tag exists
      - name: Sync Python environment
        run: uv sync --locked
        working-directory: pipeline
      - name: Math-layer tests (verify/dims/emit/ingest + goldens)
        run: uv run pytest -q
        working-directory: pipeline

      # --- Site (Node pinned to 24.x: node:sqlite is RC; type stripping) ---
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: site/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install site dependencies
        run: pnpm install --frozen-lockfile
        working-directory: site

      # Compiled-THING artifact cache: compile.py reuses artifacts whose
      # thing.yaml + pipeline fingerprint are unchanged (the build is
      # deterministic), so warm runs skip the expensive re-verification
      # (four-bar branch proving dominates a cold build).
      - name: Cache compiled THING artifacts
        uses: actions/cache@v4
        with:
          path: site/src/generated/things
          key: things-${{ hashFiles('site/src/content/things/**/thing.yaml', 'pipeline/src/**/*.py', 'pipeline/uv.lock') }}
          restore-keys: things-

      - name: Build (pipeline gen -> KaTeX gate -> parity gate -> units gate -> astro -> pagefind)
        run: pnpm run build
        working-directory: site
      - name: Engine unit tests (chaining type system, Brent)
        run: pnpm run test:unit
        working-directory: site
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium
        working-directory: site
      - name: E2E invariants + axe smoke (vs built dist)
        run: pnpm exec playwright test
        working-directory: site

      - name: Upload built site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-dist
          path: site/dist
          retention-days: 14

      # staged for the Pages deploy job; cheap to produce now
      - name: Upload Pages artifact
        if: vars.DEPLOY_PAGES == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    # DORMANT until the repo is public and DEPLOY_PAGES=true (see header note)
    if: vars.DEPLOY_PAGES == 'true' && github.ref == 'refs/heads/main'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
