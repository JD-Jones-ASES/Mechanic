  source_id: mil-hdbk-5j
  citation: MIL-HDBK-5J, Metallic Materials and Elements for Aerospace Vehicle Structures, 31 January 2003, Table
    2.3.1.0(f1), p. 2-22 (omega, lb/in.^3 = 0.283); same value in Tables 2.3.1.0(c1) p. 2-17, (c2) p. 2-18, (g1)
    p. 2-24, (g2) p. 2-25 for all low-alloy steels
  verified_at: https://ia800103.us.archive.org/BookReader/BookReaderImages.php?id=milhdbk-5-j&itemPath=/10/items/milhdbk-5-j&server=ia800103.us.archive.org&page=leaf75&scale=2&rotate=0
