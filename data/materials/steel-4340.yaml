id: steel-4340
name: AISI 4340 low-alloy steel (Ni-Cr-Mo)
class: steel
condition: 'Quenched and tempered to Ftu = 260 ksi level per MIL-HDBK-5J Table 2.3.1.0(f1) (AMS 6414, consumable-electrode
  vacuum-melted; bar, forging, tubing; thickness limits per table footnote: <=1.70 in. martempered / <=2.50 in.
  oil quench / <=3.50 in. water quench, 200 ft/min flow). Elastic and physical properties are the single nominal
  values MIL-HDBK-5J lists for all Section 2.3 low-alloy steels (4130/4140/4340/8630 group).'
cost_class: medium
cost_rationale: Ni-Cr-Mo alloying plus aerospace-quality consumable-electrode vacuum melting (AMS 6414) typically
  multiplies price several-fold over commodity carbon steel (knowledge-based premium on the verified USGS low-cost
  steel anchor); still far below titanium. Commodity-grade 4340 sits at the bottom of medium; CEVM/VAR aerospace
  stock trends toward high.
properties:
