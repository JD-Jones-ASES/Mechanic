id: steel-1045
name: AISI 1045 medium-carbon steel
class: steel
condition: Normalized bar (normalised per AS 1442 grade 1045, AISI 1045 equivalent; typical normalizing 840-920
  C per supplier datasheets). ALL VALUES TYPICAL, not spec minimums — weakest-citation row. Elastic/physical properties
  are condition-independent typicals.
cost_class: low
cost_rationale: Plain medium-carbon bar steel; small grade premium over A36 but same commodity-carbon-steel price
  class (USGS MCS 2026 iron/steel anchor, loaded).
properties:
- key: density
  value: 7.87
  unit: g/cm**3
  basis: typical
  source_id: azom-6130
  citation: 'AZoM, ''AISI 1045 Medium Carbon Steel'', Article ID 6130, Physical Properties table: 7.87 g/cc (0.284
    lb/in3)'
  verified_at: https://www.azom.com/article.aspx?ArticleID=6130
  cross_check: 'MW Components (Elgin) ''Carbon Steel Grade 1045 Fact Sheet'' PDF: identical English value 0.284
    lb/in3 (metric printed as 7.85 g/cc); Amardeep Steel blog: 7.86 g/cm3'
  notes: Condition-independent typical. Metric value varies 7.85-7.87 g/cc across sources while the English 0.284
    lb/in3 is identical; recorded as published by AZoM. AZoM table content is consistent with values third parties
    attribute to MatWeb (MatWeb itself not accessed). [unit spelling normalized from 'g/cc']
- key: youngs_modulus
  value: 200
  unit: GPa
  basis: typical
  source_id: azom-6130
  citation: 'AZoM, ''AISI 1045 Medium Carbon Steel'', Article ID 6130, Mechanical Properties table: Modulus of Elasticity
    200 GPa (29000 ksi)'
  verified_at: https://www.azom.com/article.aspx?ArticleID=6130
  cross_check: 'Leoscor Alloys, ''AISI 1045 Carbon Steel Round Bar Specifications'' PDF, physical properties table:
    Modulus of Elasticity 29x10^6 psi (= 29,000 ksi, exact match in English units)'
  notes: Condition-independent typical. MW Components/Elgin sheet gives 206 GPa (29,900 ksi) and Amardeep Steel
    209,000 MPa - normal source spread for plain carbon steel; 200 GPa / 29 Msi is the standard handbook typical.
    See discrepancies.
- key: poisson_ratio
  value: 0.29
  unit: '1'
  basis: typical
  source_id: azom-6130
  citation: 'AZoM, ''AISI 1045 Medium Carbon Steel'', Article ID 6130, Mechanical Properties table: Poisson''s Ratio
    0.290'
  verified_at: https://www.azom.com/article.aspx?ArticleID=6130
  cross_check: 'MW Components (Elgin) ''Carbon Steel Grade 1045 Fact Sheet'' PDF: Poissons Ratio 0.29, annotated
    ''Typical for steel'''
  notes: Published as 0.290 by AZoM. One outlier source (Amardeep Steel blog) gives 0.269; not used. Condition-independent.
    [unit spelling normalized from 'dimensionless']
- key: shear_modulus
  value: 80
  unit: GPa
  basis: typical
  source_id: azom-6130
  citation: 'AZoM, ''AISI 1045 Medium Carbon Steel'', Article ID 6130, Mechanical Properties table: Shear Modulus
    80 GPa (11600 ksi)'
  verified_at: https://www.azom.com/article.aspx?ArticleID=6130
  cross_check: 'MW Components (Elgin) ''Carbon Steel Grade 1045 Fact Sheet'' PDF: Shear Modulus 80.0 GPa (11600
    ksi), annotated ''Estimated from elastic'''
  notes: Supplementary to Poisson's ratio. Self-consistent with E=200 GPa and nu=0.29 within rounding (E/2(1+nu)
    = 77.5 GPa).
- key: yield_strength
  value: 410
  unit: MPa
  basis: typical
  source_id: interlloy-1045
  citation: 'Interlloy Pty Ltd, ''1045 Medium Tensile Carbon Steel Bar'' datasheet, ''Typical Mechanical Properties
    - Normalised Condition'' table (grade per AS 1442-1992 1045): Yield Strength 410 MPa, Elongation in 50mm 22%,
    Impact Izod 54 J, Hardness 187 HB / Rc 10'
  verified_at: https://www.interlloy.com.au/our-products/carbon-steels/1045-medium-tensile-carbon-steel-bar/
  cross_check: 'Sciencing.com, ''Properties of 1045 Steel'': normalized condition yield strength 410 MPa, with matching
    elongation 22%, Izod 54, 187 HB (independent reproduction of the same dataset)'
  notes: TYPICAL value for normalized condition, explicitly NOT a guaranteed/spec minimum (Interlloy supplies 1045
    to chemistry only). For contrast, ASTM A29-family hot-rolled 1045 estimated minimum yield is 45,000 psi (SAE
    J1397, verified in Pivot Point reproduction).
- key: ultimate_strength
  value: 640
  unit: MPa
  basis: typical
  source_id: interlloy-1045
  citation: 'Interlloy Pty Ltd, ''1045 Medium Tensile Carbon Steel Bar'' datasheet, ''Typical Mechanical Properties
    - Normalised Condition'' table (grade per AS 1442-1992 1045): Tensile Strength 640 MPa'
  verified_at: https://www.interlloy.com.au/our-products/carbon-steels/1045-medium-tensile-carbon-steel-bar/
  cross_check: 'No second source with the exact 640 MPa found. Consistency checks: AZoM/Kloeckner/Leoscor all quote
    570-700 MPa typical tensile range for hot-rolled-or-normalised 1045 (640 falls inside); value is consistent
    with the accompanying 187 HB (~3.4xHB ~ 645 MPa). Sciencing reproduction of the same table prints 540 MPa -
    suspected transcription typo (see discrepancies).'
  notes: 'TYPICAL value for normalized condition, not a spec minimum. Weakest-citation value in this row: single
    primary supplier datasheet, with third-party reproduction agreeing on every accompanying value except tensile.
    CAUTION (cross-check): single-primary-source value; conflicting 540 MPa reproductions exist. 640 MPa is the
    hardness-consistent choice (187 HB x ~3.4 = 645); normalized band is 570-700 MPa.'
- key: coefficient_of_thermal_expansion
  value: 11.6
  unit: 1e-6/K
  basis: typical
  source_id: asm-ready-ref
  citation: 'AmesWeb ''Thermal Expansion Coefficient of Steel by Grade'' table (citing Cverna, F.,
    ASM Ready Reference: Thermal Properties of Metals, ASM International, 2002), AISI 1045 (annealed)
    row: 11.6 x 10^-6/degC over 0-100 degC (32-212 degF).'
  verified_at: https://amesweb.info/Materials/Linear_Thermal_Expansion_Coefficient_of_Steel.aspx
  cross_check: 'AZoM ''AISI 1045 Carbon Steel (UNS G10450)'': 11.2 um/m-degC over 0-100 degC/32-212 degF
    (a hair lower, same range). Both sit in the 11-12 x 10^-6/degC band expected for medium-carbon steel.'
  notes: 'Mean coefficient of linear thermal expansion, 0-100 degC, annealed. [unit spelling normalized
    from ''10^-6/degC''; a linear CTE per degC equals the same value per K, since both are interval
    degrees.]'
errata: []
